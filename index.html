<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 운세 🌟</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { background:#e8f5e0; min-height:100%; display:flex; justify-content:center; align-items:flex-start; font-family:'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; }

    /* 앱 프레임 */
    #app { width:390px; min-height:100vh; background:#fff; position:relative; overflow:hidden; }

    /* 헤더 */
    .app-header { background:#fff; padding:14px 20px; display:flex; align-items:center; justify-content:center; border-bottom:1px solid #f0f0f0; position:sticky; top:0; z-index:10; }
    .app-header h1 { font-size:17px; font-weight:700; color:#222; }
    .app-header .back { position:absolute; left:16px; font-size:20px; cursor:pointer; color:#444; background:none; border:none; }

    /* ── API KEY 오버레이 ── */
    #apikey-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(160deg,#e8f5e0,#fffde7); display:flex; align-items:center; justify-content:center; z-index:100; }
    .apikey-box { background:#fff; border-radius:24px; padding:36px 28px; width:340px; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.10); }
    .apikey-logo { font-size:56px; margin-bottom:10px; }
    .apikey-box h2 { font-size:22px; font-weight:900; color:#222; margin-bottom:6px; }
    .apikey-box p { font-size:13px; color:#888; margin-bottom:22px; line-height:1.7; }
    .apikey-box input { width:100%; border:1.5px solid #d0e8c0; border-radius:12px; padding:13px 16px; font-size:13px; outline:none; margin-bottom:12px; font-family:inherit; color:#333; background:#f8fdf4; }
    .apikey-box input:focus { border-color:#3dba6f; }
    .apikey-box button { width:100%; background:#3dba6f; border:none; border-radius:50px; padding:14px; color:white; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:background .2s; }
    .apikey-box button:hover { background:#34a860; }
    .apikey-err { color:#e53e3e; font-size:12px; margin-top:8px; display:none; }

    /* ── 채팅 화면 ── */
    #chat-screen { display:none; flex-direction:column; height:100vh; }
    #chat-screen.active { display:flex; }
    #chat-area { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:12px; background:#f7fdf2; }
    #chat-area::-webkit-scrollbar { width:0; }
    .msg-row { display:flex; align-items:flex-end; gap:8px; }
    .msg-row.user { flex-direction:row-reverse; }
    .msg-avatar { width:34px; height:34px; border-radius:50%; background:#3dba6f; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
    .bubble { max-width:75%; padding:12px 16px; border-radius:20px; font-size:14px; line-height:1.6; word-break:keep-all; }
    .bot .bubble { background:#fff; color:#333; border-bottom-left-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
    .user .bubble { background:#3dba6f; color:#fff; border-bottom-right-radius:4px; }
    .msg-time { font-size:10px; color:#bbb; margin-bottom:4px; }
    .typing-bubble { background:#fff; border-radius:20px; border-bottom-left-radius:4px; padding:14px 18px; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
    .dot { display:inline-block; width:7px; height:7px; background:#aaa; border-radius:50%; margin:0 2px; animation:bounce 1.2s infinite; }
    .dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
    #chat-input-area { background:#fff; border-top:1px solid #eee; padding:12px 14px; display:flex; gap:10px; align-items:center; }
    #user-input { flex:1; background:#f5f5f5; border:none; border-radius:24px; padding:12px 18px; font-size:14px; outline:none; font-family:inherit; color:#333; }
    #user-input::placeholder { color:#aaa; }
    #send-btn { background:#3dba6f; border:none; border-radius:50%; width:44px; height:44px; cursor:pointer; font-size:18px; color:white; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .2s; }
    #send-btn:hover { background:#34a860; }
    #send-btn:disabled { background:#ccc; cursor:default; }

    /* 시간 버튼 */
    .time-btns { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
    .time-btn { background:#f0fae8; border:1.5px solid #b8e0a0; color:#2d8c4e; border-radius:20px; padding:6px 14px; font-size:12px; cursor:pointer; font-family:inherit; font-weight:500; transition:all .2s; }
    .time-btn:hover { background:#3dba6f; color:#fff; border-color:#3dba6f; }
    .time-btn:disabled { opacity:.5; cursor:default; }

    /* ── 결과 화면 ── */
    #result-screen { display:none; }
    #result-screen.active { display:block; }

    /* 그라데이션 상단 */
    .result-hero { background:linear-gradient(160deg, #c8efc0 0%, #e8f5d0 40%, #fffde7 100%); padding:32px 24px 28px; text-align:center; position:relative; }
    .result-hero::after { content:''; position:absolute; bottom:0; left:0; width:100%; height:30px; background:linear-gradient(to bottom,transparent,#fff); }
    .hero-badge { display:inline-flex; flex-direction:column; align-items:center; justify-content:center; width:90px; height:90px; background:#3dba6f; border-radius:50%; margin-bottom:16px; box-shadow:0 4px 20px rgba(61,186,111,0.35); }
    .hero-badge .badge-icon { font-size:32px; line-height:1; }
    .hero-badge .badge-text { font-size:11px; font-weight:700; color:#fff; margin-top:2px; }
    .hero-title { font-size:22px; font-weight:900; color:#222; margin-bottom:8px; }
    .hero-name { font-size:14px; color:#555; }
    .hero-name span { font-weight:700; color:#3dba6f; }

    /* 스파클 */
    .sparkles { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; }
    .sp { position:absolute; font-size:16px; opacity:.7; animation:spFloat 3s ease-in-out infinite; }
    @keyframes spFloat { 0%,100%{transform:translateY(0) rotate(0deg);opacity:.7} 50%{transform:translateY(-10px) rotate(15deg);opacity:1} }

    /* 운세 콘텐츠 */
    .result-content { padding:20px 16px; background:#fff; }

    /* 오늘의 운세 카드 */
    .daily-fortune-card { background:linear-gradient(135deg,#f0fae8,#fffde7); border-radius:20px; padding:22px 20px; margin-bottom:20px; border:1px solid #d8f0c0; }
    .daily-fortune-card .section-label { font-size:12px; font-weight:700; color:#3dba6f; margin-bottom:8px; letter-spacing:0.5px; }
    .daily-fortune-card .fortune-text { font-size:15px; color:#333; line-height:1.8; font-weight:500; text-align:center; }
    .daily-fortune-card .oneliner { font-size:16px; font-weight:900; color:#222; text-align:center; margin-bottom:10px; }

    /* 카테고리 운세 */
    .category-section { margin-bottom:20px; }
    .category-section h3 { font-size:14px; font-weight:700; color:#222; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
    .fortune-cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .fortune-card { background:#f9f9f9; border-radius:16px; padding:16px 14px; border:1px solid #eee; transition:transform .2s; }
    .fortune-card:hover { transform:translateY(-2px); }
    .fortune-card .card-label { font-size:11px; font-weight:700; color:#888; margin-bottom:6px; display:flex; align-items:center; gap:4px; }
    .fortune-card .card-text { font-size:12px; color:#444; line-height:1.6; }
    .fortune-card.love { background:#fff5f8; border-color:#ffd6e0; }
    .fortune-card.love .card-label { color:#e91e8c; }
    .fortune-card.money { background:#fffbf0; border-color:#ffe0a0; }
    .fortune-card.money .card-label { color:#f59e0b; }
    .fortune-card.career { background:#f0f5ff; border-color:#c7d7ff; }
    .fortune-card.career .card-label { color:#3b6ef5; }
    .fortune-card.health { background:#f0fff8; border-color:#b8f0d8; }
    .fortune-card.health .card-label { color:#10b981; }

    /* 행운 부스트 */
    .lucky-boost { background:linear-gradient(135deg,#fff9f0,#fff5e0); border-radius:20px; padding:20px; margin-bottom:20px; border:1px solid #ffe0b0; }
    .lucky-boost .boost-title { font-size:16px; font-weight:900; color:#f59e0b; margin-bottom:14px; display:flex; align-items:center; gap:6px; }
    .lucky-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .lucky-item { background:#fff; border-radius:12px; padding:12px 14px; border:1px solid #ffe0b0; }
    .lucky-item .l-label { font-size:11px; color:#aaa; margin-bottom:4px; }
    .lucky-item .l-value { font-size:14px; font-weight:700; color:#333; }

    /* 미니게임 버튼 */
    .game-btn-wrap { padding:0 16px 24px; }
    .game-btn { width:100%; background:#fff; border:2px solid #3dba6f; border-radius:50px; padding:15px; color:#3dba6f; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s; }
    .game-btn:hover { background:#3dba6f; color:#fff; }

    /* ── 미니게임 화면 ── */
    #game-screen { display:none; }
    #game-screen.active { display:block; }
    .game-hero { background:linear-gradient(160deg,#c8efc0,#fffde7); padding:28px 24px; text-align:center; }
    .game-hero h2 { font-size:20px; font-weight:900; color:#222; margin-bottom:6px; }
    .game-hero p { font-size:13px; color:#666; }
    .game-content { padding:24px 20px; background:#fff; }
    .cards-row { display:flex; gap:12px; justify-content:center; margin-bottom:16px; }
    .card-item { width:100px; height:145px; perspective:700px; cursor:pointer; }
    .card-inner { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .65s cubic-bezier(.4,0,.2,1); }
    .card-item.flipped .card-inner { transform:rotateY(180deg); }
    .card-face { position:absolute; width:100%; height:100%; backface-visibility:hidden; border-radius:16px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:10px; }
    .card-back { background:linear-gradient(135deg,#3dba6f,#2d8c4e); border:none; color:#fff; box-shadow:0 4px 16px rgba(61,186,111,.3); }
    .card-back .cb-num { font-size:28px; font-weight:900; margin-bottom:4px; }
    .card-back .cb-hint { font-size:11px; opacity:.8; }
    .card-front { background:linear-gradient(135deg,#fffde7,#fff9c4); transform:rotateY(180deg); box-shadow:0 4px 16px rgba(245,158,11,.2); }
    .card-front .item-emoji { font-size:28px; margin-bottom:6px; }
    .card-front .item-text { font-size:10px; font-weight:700; color:#444; line-height:1.4; }
    .game-hint { text-align:center; font-size:13px; color:#888; margin-bottom:20px; }
    .game-result-msg { background:#f0fae8; border-radius:16px; padding:18px; text-align:center; font-size:14px; color:#2d8c4e; line-height:1.7; font-weight:500; margin-bottom:16px; display:none; }
    .retry-btn { width:100%; background:#f5f5f5; border:none; border-radius:50px; padding:14px; color:#666; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }

    /* 구분선 */
    .divider { height:8px; background:#f5f5f5; margin:0 -16px; }
  </style>
</head>
<body>
<div id="app">

  <!-- API Key 오버레이 -->
  <div id="apikey-overlay">
    <div class="apikey-box">
      <div class="apikey-logo">🌟</div>
      <h2>오늘의 운세</h2>
      <p>이름과 생년월일을 입력하면<br>오늘의 운세와 행운 아이템을 알려드려요</p>
      <input type="text" id="apikey-input" placeholder="Gemini API Key (AIza...)" onkeydown="if(event.key==='Enter')submitApiKey()"/>
      <button onclick="submitApiKey()">시작하기 ✨</button>
      <div class="apikey-err" id="apikey-err">⚠️ API Key를 입력해주세요!</div>
    </div>
  </div>

  <!-- 채팅 화면 -->
  <div id="chat-screen">
    <div class="app-header">
      <h1>오늘의 운세</h1>
    </div>
    <div id="chat-area"></div>
    <div id="chat-input-area">
      <input type="text" id="user-input" placeholder="메시지를 입력하세요..." onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button id="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="result-screen">
    <div class="app-header">
      <button class="back" onclick="goBack()">←</button>
      <h1>오늘의 운세</h1>
    </div>

    <div class="result-hero">
      <div class="sparkles">
        <span class="sp" style="left:10%;top:20%;animation-delay:0s">✦</span>
        <span class="sp" style="left:80%;top:15%;animation-delay:.5s">✦</span>
        <span class="sp" style="left:20%;top:70%;animation-delay:1s">✨</span>
        <span class="sp" style="left:75%;top:65%;animation-delay:1.5s">✦</span>
        <span class="sp" style="left:50%;top:10%;animation-delay:.8s">⭐</span>
      </div>
      <div class="hero-badge">
        <span class="badge-icon">🌟</span>
        <span class="badge-text">오늘의 운세</span>
      </div>
      <div class="hero-title" id="result-name"></div>
      <div class="hero-name">오늘 하루도 좋은 일이 가득하길 바랍니다 💚</div>
    </div>

    <div class="result-content">

      <!-- 한줄 운세 -->
      <div class="daily-fortune-card">
        <div class="section-label">✦ 오늘의 한줄 운세</div>
        <div class="oneliner" id="result-oneliner"></div>
        <div class="fortune-text" id="result-general"></div>
      </div>

      <div class="divider"></div>
      <div style="height:16px"></div>

      <!-- 카테고리 운세 -->
      <div class="category-section">
        <h3>📋 카테고리별 운세</h3>
        <div class="fortune-cards">
          <div class="fortune-card love">
            <div class="card-label">💕 연애운</div>
            <div class="card-text" id="r-love"></div>
          </div>
          <div class="fortune-card money">
            <div class="card-label">💰 재물운</div>
            <div class="card-text" id="r-money"></div>
          </div>
          <div class="fortune-card career">
            <div class="card-label">📚 취업/학업운</div>
            <div class="card-text" id="r-career"></div>
          </div>
          <div class="fortune-card health">
            <div class="card-label">💪 건강운</div>
            <div class="card-text" id="r-health"></div>
          </div>
        </div>
      </div>

      <div class="divider"></div>
      <div style="height:16px"></div>

      <!-- 행운 부스트 -->
      <div class="lucky-boost">
        <div class="boost-title">⚡ 이번 주 행운 부스트</div>
        <div class="lucky-grid">
          <div class="lucky-item">
            <div class="l-label">행운의 색깔</div>
            <div class="l-value" id="r-color">-</div>
          </div>
          <div class="lucky-item">
            <div class="l-label">행운의 숫자</div>
            <div class="l-value" id="r-number">-</div>
          </div>
          <div class="lucky-item">
            <div class="l-label">행운의 장소</div>
            <div class="l-value" id="r-place">-</div>
          </div>
          <div class="lucky-item">
            <div class="l-label">행운의 물건</div>
            <div class="l-value" id="r-item">-</div>
          </div>
        </div>
      </div>

    </div>

    <div class="game-btn-wrap">
      <button class="game-btn" onclick="goToGame()">🎴 행운 아이템 뽑기 미니게임</button>
    </div>
  </div>

  <!-- 미니게임 화면 -->
  <div id="game-screen">
    <div class="app-header">
      <button class="back" onclick="goToResult()">←</button>
      <h1>행운 아이템 뽑기</h1>
    </div>
    <div class="game-hero">
      <h2>🎴 오늘의 행운 아이템</h2>
      <p>카드 3장 중 하나를 선택하세요!</p>
    </div>
    <div class="game-content">
      <div class="cards-row" id="cards-row"></div>
      <div class="game-hint" id="game-hint">카드를 하나 선택해 탭하세요 ✨</div>
      <div class="game-result-msg" id="game-result-msg"></div>
      <button class="retry-btn" id="retry-btn" style="display:none" onclick="goToResult()">← 운세 다시 보기</button>
    </div>
  </div>

</div>

<script>
// ── 운세 텍스트 풀 ─────────────────────────────────────────
const FORTUNE_POOL = {
  연애: [
    "새로운 인연이 자연스럽게 다가오는 흐름입니다. 열린 마음이 좋은 기회를 만듭니다.",
    "가까운 사람과의 관계가 한층 깊어질 수 있는 시기입니다.",
    "감정 표현이 중요한 운세입니다. 솔직한 대화가 관계를 안정시켜 줍니다.",
    "예상하지 못한 만남이 설렘으로 이어질 수 있습니다.",
    "연애보다는 자신을 가꾸는 시간이 더 큰 매력을 만들어주는 시기입니다.",
    "과거의 인연이 다시 떠오를 수 있으나 현재의 행복을 우선하는 것이 좋습니다."
  ],
  재물: [
    "꾸준히 쌓아온 노력이 금전적인 성과로 이어질 가능성이 높습니다.",
    "계획적인 소비가 앞으로의 재정 안정에 큰 도움이 됩니다.",
    "새로운 수입원을 발견할 기회가 찾아올 수 있습니다.",
    "작은 지출이 쌓이지 않도록 관리가 필요한 시기입니다.",
    "예상치 못한 행운이 재물운을 상승시키는 흐름입니다.",
    "단기적인 이익보다 장기적인 안목이 빛을 발하는 운세입니다."
  ],
  취업학업: [
    "집중력이 높아지며 원하는 목표에 한 걸음 더 가까워질 수 있습니다.",
    "새로운 도전이 예상보다 좋은 결과로 이어질 가능성이 있습니다.",
    "주변의 조언과 협력이 큰 도움이 되는 시기입니다.",
    "꾸준함이 가장 강력한 무기가 되는 운세입니다.",
    "자신을 보여줄 기회가 찾아오며 좋은 평가를 받을 수 있습니다.",
    "잠시 정체된 것처럼 느껴져도 성장의 흐름은 계속 이어지고 있습니다."
  ],
  건강: [
    "전반적으로 안정적인 흐름이 예상됩니다.",
    "충분한 휴식이 컨디션 회복에 큰 도움이 되는 시기입니다.",
    "규칙적인 생활습관이 건강운을 더욱 높여줄 수 있습니다.",
    "스트레스 관리에 신경 쓰면 몸과 마음의 균형을 찾을 수 있습니다.",
    "무리한 일정은 피하고 체력 안배에 집중하는 것이 좋습니다.",
    "작은 생활 습관의 변화가 긍정적인 결과를 가져올 수 있습니다."
  ]
};

const LUCKY_COLORS = ["노랑","초록","하늘색","보라","빨강","주황","흰색","민트","골드","라벤더"];
const LUCKY_PLACES = ["공원","카페","도서관","서점","산책로","바다","미술관","집 근처 공원","조용한 카페","햇빛이 드는 창가"];
const LUCKY_ITEMS  = ["별처럼 은은하게 빛나는 아이템","초록색 식물","작은 노트","좋아하는 향의 디퓨저","밝은 색 파우치","귀여운 키링","새 볼펜","따뜻한 음료","반짝이는 액세서리","초록색 소품"];
const GAME_ITEMS   = [
  ["🌿","초록색 식물","긍정 에너지를 끌어당겨요"],
  ["📒","작은 노트","아이디어가 넘치는 하루가 돼요"],
  ["🕯️","향기 디퓨저","마음을 안정시켜 줍니다"],
  ["☕","따뜻한 음료","오늘의 활력 충전!"],
  ["✏️","새 볼펜","새로운 시작을 응원해요"],
  ["💚","초록 소품","행운을 가져다 줍니다"],
  ["🔑","귀여운 키링","소중한 것을 지켜줘요"],
  ["🌸","밝은 색 파우치","설레는 하루의 시작"],
  ["⭐","반짝이는 액세서리","빛나는 하루가 될 거예요"],
  ["🍀","네잎 클로버","오늘 행운이 따라다녀요"]
];

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

// ── 상태 ─────────────────────────────────────────────────
let GEMINI_KEY = "";
let step = "name";
let userInfo = { name:"", year:"", month:"", day:"", hour:"", minute:"" };
let fortuneResult = null;
let waiting = false;
let gameDone = false;

// ── API Key ───────────────────────────────────────────────
function submitApiKey() {
  let v = document.getElementById("apikey-input").value.trim();
  if (!v) { document.getElementById("apikey-err").style.display="block"; return; }
  GEMINI_KEY = v;
  document.getElementById("apikey-overlay").style.display = "none";
  showScreen("chat");
  startChat();
}

// ── 화면 전환 ─────────────────────────────────────────────
function showScreen(name) {
  document.getElementById("chat-screen").classList.remove("active");
  document.getElementById("result-screen").classList.remove("active");
  document.getElementById("game-screen").classList.remove("active");
  if (name==="chat") document.getElementById("chat-screen").classList.add("active");
  if (name==="result") document.getElementById("result-screen").classList.add("active");
  if (name==="game") document.getElementById("game-screen").classList.add("active");
  window.scrollTo(0,0);
}
function goBack()     { showScreen("chat"); }
function goToResult() { showScreen("result"); }
function goToGame()   { setupGame(); showScreen("game"); }

// ── 채팅 ──────────────────────────────────────────────────
function startChat() {
  botMsg("안녕하세요! 🌟<br>오늘의 운세를 알려드릴게요.<br><br><b>이름</b>을 알려주세요 😊");
}

function sendMsg() {
  if (waiting) return;
  let inp = document.getElementById("user-input");
  let val = inp.value.trim(); if (!val) return;
  inp.value = ""; addMsg("user", val); handleStep(val);
}

function handleStep(val) {
  if (step==="name") {
    userInfo.name = val; step = "year";
    setTimeout(()=>botMsg("반가워요, <b>"+val+"</b>님! 🎉<br><br>태어난 <b>연도</b>를 입력해주세요<br>예) 1998"),400);
  } else if (step==="year") {
    if(isNaN(val)||val.length!==4){botMsg("⚠️ 연도는 4자리 숫자로 입력해주세요<br>예) 1998");return;}
    userInfo.year=val; step="month";
    setTimeout(()=>botMsg("태어난 <b>월</b>을 입력해주세요<br>예) 3"),400);
  } else if (step==="month") {
    if(isNaN(val)||+val<1||+val>12){botMsg("⚠️ 월은 1~12 사이로 입력해주세요");return;}
    userInfo.month=val; step="day";
    setTimeout(()=>botMsg("태어난 <b>일</b>을 입력해주세요<br>예) 15"),400);
  } else if (step==="day") {
    if(isNaN(val)||+val<1||+val>31){botMsg("⚠️ 일은 1~31 사이로 입력해주세요");return;}
    userInfo.day=val; step="hour";
    setTimeout(()=>showHourBtns(),400);
  } else if (step==="minute_direct") {
    if(isNaN(val)||+val<0||+val>59){botMsg("⚠️ 분은 0~59 사이로 입력해주세요");return;}
    userInfo.minute=String(+val).padStart(2,"0"); step="done";
    setTimeout(()=>startFortune(),400);
  }
}

function showHourBtns() {
  let btns = Array.from({length:24},(_,i)=>`<button class="time-btn" onclick="selectHour(${i})">${i}시</button>`).join("");
  botMsgHTML(`<div class="bubble" style="max-width:85%">태어난 <b>시</b>를 선택해주세요 🕐<br><small style="color:#aaa">(모르면 12시 선택)</small><div class="time-btns">${btns}</div></div>`);
}

function selectHour(h) {
  if(step!=="hour") return;
  userInfo.hour=String(h).padStart(2,"0");
  document.querySelectorAll(".time-btn").forEach(b=>b.disabled=true);
  addMsg("user",h+"시"); step="minute";
  setTimeout(()=>showMinuteBtns(),400);
}

function showMinuteBtns() {
  let mins=[0,10,20,30,40,50];
  let btns=mins.map(m=>`<button class="time-btn" onclick="selectMinute(${m})">${String(m).padStart(2,"0")}분</button>`).join("");
  botMsgHTML(`<div class="bubble" style="max-width:85%">태어난 <b>분</b>을 선택해주세요 🕐<br><small style="color:#aaa">(모르면 00분 선택)</small><div class="time-btns">${btns}</div><div style="margin-top:8px;font-size:11px;color:#bbb">직접 입력하려면 채팅창에 숫자로 입력하세요</div></div>`);
  step="minute";
}

function selectMinute(m) {
  if(step!=="minute") return;
  userInfo.minute=String(m).padStart(2,"0");
  document.querySelectorAll(".time-btn").forEach(b=>b.disabled=true);
  addMsg("user",String(m).padStart(2,"0")+"분"); step="done";
  setTimeout(()=>startFortune(),400);
}

function startFortune() {
  botMsg("✨ 입력 완료!<br>🔮 <b>"+userInfo.name+"</b>님의 운세를 분석하고 있어요...<br>잠시만 기다려주세요!");
  document.getElementById("send-btn").disabled=true;
  showTyping(); waiting=true;
  // 랜덤으로 운세 텍스트 미리 뽑기
  let localFortune = {
    연애: pick(FORTUNE_POOL.연애),
    재물: pick(FORTUNE_POOL.재물),
    취업학업: pick(FORTUNE_POOL.취업학업),
    건강: pick(FORTUNE_POOL.건강),
    color: pick(LUCKY_COLORS),
    number: Math.floor(Math.random()*44)+1,
    place: pick(LUCKY_PLACES),
    item: pick(LUCKY_ITEMS)
  };
  fetchGemini(localFortune);
}

// ── Gemini: 한줄운세만 요청 ───────────────────────────────
function fetchGemini(localFortune) {
  let today = new Date();
  let todayStr = today.getFullYear()+"년 "+(today.getMonth()+1)+"월 "+today.getDate()+"일";
  let prompt = `사용자: 이름 ${userInfo.name}, 생년월일 ${userInfo.year}년 ${userInfo.month}월 ${userInfo.day}일, 태어난 시각 ${userInfo.hour}시 ${userInfo.minute}분, 오늘 날짜 ${todayStr}.
오늘의 운세를 MZ세대 감성으로 딱 한 줄로 표현해주세요. 임팩트 있고 공감 가는 문장으로, 이름을 넣어서.
예시: "유진님, 오늘은 멈추지 말고 그냥 달려요 🏃"
한 줄 텍스트만 반환하세요. 따옴표 없이.`;

  fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent",{
    method:"POST",
    headers:{"x-goog-api-key":GEMINI_KEY,"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{role:"user",parts:[{text:prompt}]}]})
  })
  .then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
  .then(data=>{
    let oneliner = data.candidates[0].content.parts[0].text.trim().replace(/^"|"$/g,"");
    localFortune.oneliner = oneliner;
    showFortuneResult(localFortune);
  })
  .catch(err=>{
    // Gemini 실패해도 기본 한줄운세로 결과 표시
    let errCode = err.message.includes("429") ? "잠시 후 다시 시도해주세요" : err.message;
    localFortune.oneliner = userInfo.name+"님, 오늘 하루도 빛나는 하루가 될 거예요 ✨";
    showFortuneResult(localFortune);
    console.warn("Gemini error (fallback used):", errCode);
  });
}

function showFortuneResult(f) {
  removeTyping(); waiting=false;
  document.getElementById("send-btn").disabled=false;
  fortuneResult = f;
  // 결과 화면 데이터 채우기
  document.getElementById("result-name").textContent = userInfo.name+"님의 오늘 운세";
  document.getElementById("result-oneliner").textContent = f.oneliner;
  document.getElementById("result-general").textContent =
    userInfo.year+"년 "+userInfo.month+"월 "+userInfo.day+"일생, "+userInfo.hour+"시 "+userInfo.minute+"분 출생";
  document.getElementById("r-love").textContent = f.연애;
  document.getElementById("r-money").textContent = f.재물;
  document.getElementById("r-career").textContent = f.취업학업;
  document.getElementById("r-health").textContent = f.건강;
  document.getElementById("r-color").textContent = f.color;
  document.getElementById("r-number").textContent = f.number;
  document.getElementById("r-place").textContent = f.place;
  document.getElementById("r-item").textContent = f.item;

  botMsg("🎉 운세 분석 완료!<br>아래 버튼을 눌러 결과를 확인하세요 👇");
  // 결과 보기 버튼
  let chat = document.getElementById("chat-area");
  let div = document.createElement("div");
  div.style.cssText="padding:4px 0 8px 42px";
  div.innerHTML=`<button onclick="showScreen('result')" style="background:#3dba6f;border:none;border-radius:50px;padding:13px 28px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">결과 보기 →</button>`;
  chat.appendChild(div); scrollToBottom();
}

// ── 미니게임 ──────────────────────────────────────────────
function setupGame() {
  gameDone = false;
  // 랜덤 3장 선택
  let shuffled = [...GAME_ITEMS].sort(()=>Math.random()-.5).slice(0,3);
  let row = document.getElementById("cards-row");
  row.innerHTML = shuffled.map((item,i)=>`
    <div class="card-item" id="gc${i}" onclick="flipGameCard(${i})">
      <div class="card-inner">
        <div class="card-face card-back"><div class="cb-num">${i+1}</div><div class="cb-hint">탭하기</div></div>
        <div class="card-face card-front"><div class="item-emoji">${item[0]}</div><div class="item-text">${item[1]}<br><span style="font-weight:400;color:#777">${item[2]}</span></div></div>
      </div>
    </div>`).join("");
  document.getElementById("game-hint").textContent = "카드를 하나 선택해 탭하세요 ✨";
  document.getElementById("game-result-msg").style.display="none";
  document.getElementById("retry-btn").style.display="none";
  window._gameItems = shuffled;
}

function flipGameCard(idx) {
  if(gameDone) return;
  gameDone = true;
  document.getElementById("gc"+idx).classList.add("flipped");
  document.getElementById("game-hint").textContent = "✨ 오늘의 행운 아이템이 공개되었어요!";
  setTimeout(()=>{
    for(let i=0;i<3;i++) document.getElementById("gc"+i).classList.add("flipped");
    let picked = window._gameItems[idx];
    let msg = document.getElementById("game-result-msg");
    msg.innerHTML = `오늘의 행운 아이템은<br><b style="font-size:18px">${picked[0]} ${picked[1]}</b>이에요!<br>${picked[2]}<br><br>오늘 하루도 행운이 가득하길 바랍니다 🍀`;
    msg.style.display="block";
    document.getElementById("retry-btn").style.display="block";
    scrollToBottom();
  },700);
}

// ── UI 헬퍼 ───────────────────────────────────────────────
function now(){let d=new Date();return d.getHours()+":"+(d.getMinutes()<10?"0":"")+d.getMinutes();}
function addMsg(role,text){
  let chat=document.getElementById("chat-area");
  let div=document.createElement("div");
  div.className="msg-row "+role;
  if(role==="bot"){
    div.innerHTML=`<div class="msg-avatar">🌟</div><div><div class="msg-time">${now()}</div><div class="bubble">${text}</div></div>`;
  } else {
    div.innerHTML=`<div><div class="msg-time" style="text-align:right">${now()}</div><div class="bubble">${text}</div></div>`;
  }
  chat.appendChild(div); scrollToBottom();
}
function botMsg(t){addMsg("bot",t);}
function botMsgHTML(html){
  let chat=document.getElementById("chat-area");
  let div=document.createElement("div");
  div.className="msg-row bot";
  div.innerHTML=`<div class="msg-avatar">🌟</div><div><div class="msg-time">${now()}</div>${html}</div>`;
  chat.appendChild(div); scrollToBottom();
}
function showTyping(){
  let chat=document.getElementById("chat-area");
  let div=document.createElement("div");
  div.className="msg-row bot"; div.id="typing-ind";
  div.innerHTML=`<div class="msg-avatar">🌟</div><div><div class="typing-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>`;
  chat.appendChild(div); scrollToBottom();
}
function removeTyping(){let el=document.getElementById("typing-ind");if(el)el.remove();}
function scrollToBottom(){let c=document.getElementById("chat-area");setTimeout(()=>{c.scrollTop=c.scrollHeight;},60);}
</script>
